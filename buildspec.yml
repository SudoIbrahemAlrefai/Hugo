version: 0.2

phases:
  install:
    commands:
      - echo "Downloading Hugo..."
      - curl -L -o hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v0.146.0/hugo_extended_0.146.0_linux-amd64.tar.gz
      - tar -xzf hugo.tar.gz
      - chmod +x hugo
      - ./hugo version
  build:
    commands:
      - echo "Building Hugo site..."
      - rm -rf public
      - echo "Contents of hugo.toml:"
      - cat hugo.toml
      - ./hugo --minify
      - echo "Contents of public/ after build:"
      - ls public/
      - echo "Checking index.html for Hello Professor:"
      - grep -i "hello professor" public/index.html || echo "TEXT NOT FOUND IN INDEX"
artifacts:
  base-directory: public
  files:
    - '**/*'
