version: 0.2

phases:
  install:
    commands:
      - echo "Extracting Hugo binary..."
      - tar -xzf hugo_extended_0.121.0_linux-amd64.tar.gz
      - chmod +x hugo
      - ./hugo version
  build:
    commands:
      - echo "Building Hugo site..."
      - ./hugo --minify
artifacts:
  base-directory: public
  files:
    - '**/*'
